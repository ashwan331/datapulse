<!DOCTYPE html>
<html>
<head>
    <title>DataPulse Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fc;
        }

        .login-card{
            margin-top:120px;
            border:none;
            border-radius:15px;
        }
    </style>

</head>
<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card shadow login-card">

<div class="card-body p-4">

<h2 class="text-center mb-4">
📊 DataPulse
</h2>

<form method="POST">

<input
type="text"
name="username"
class="form-control mb-3"
placeholder="Username"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

<p class="text-center mt-3">
admin / admin123
</p>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
