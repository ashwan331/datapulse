<!DOCTYPE html>
<html>
<head>

<title>DataPulse Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fc;
}

.login-card{
    margin-top:100px;
    border:none;
    border-radius:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow login-card">

<div class="card-body p-4">

<h2 class="text-center mb-4">
📊 DataPulse
</h2>
{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form method="POST">

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

<p class="text-center mt-3">

Don't have an account?

<a href="/signup">
Sign Up
</a>

</p>
<p class="text-center">

<a href="/forgot_password">
Forgot Password?
</a>

</p>
</div>

</div>

</div>

</div>

</div>

</body>
</html>
