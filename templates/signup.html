<!DOCTYPE html>
<html>
<head>

<title>DataPulse Sign Up</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f7fc;
}

.signup-card{
    margin-top:80px;
    border:none;
    border-radius:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow signup-card">

<div class="card-body p-4">

<h2 class="text-center mb-4">

📊 Create Account

</h2>

<form method="POST">

<input
type="text"
name="name"
class="form-control mb-3"
placeholder="Full Name"
required>

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button
class="btn btn-success w-100">

Create Account

</button>

</form>

<p class="text-center mt-3">

Already have an account?

<a href="/login">
Login
</a>

</p>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
